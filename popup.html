<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .moon { font-size: 20px; }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }

    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #6c63ff; }
    input:checked + .slider::before { transform: translateX(18px); }

    .status {
      font-size: 11px;
      text-align: center;
      color: #666;
      margin-top: 4px;
    }

    .status.on { color: #6c63ff; }
  </style>
</head>
<body>
  <div class="header">
    <span class="moon">🌙</span>
    <div>
      <h1>Dark Mode</h1>
      <div class="subtitle">Learning Portal</div>
    </div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Enable dark mode</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="status">Loading...</div>

  <script src="popup.js"></script>
</body>
</html>
